name: Pipeline Python CI

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar código
      - name: Checkout del código
        uses: actions/checkout@v4

      # 2. Instalar Python de forma oficial
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Instalar dependencias
      - name: Instalar Pytest
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-html

      # 4. Ejecutar pruebas y generar reporte HTML
      - name: Ejecutar pruebas con Pytest
        run: |
          pytest --html=reporte.html --self-contained-html

      # 5. Guardar el reporte como un "Artefacto" (Para descargar)
      - name: Subir Reporte
        if: always() # Se sube aunque la prueba falle
        uses: actions/upload-artifact@v4
        with:
          name: reporte-python-html
          path: reporte.html